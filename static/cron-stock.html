<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅股票定时推送</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --border: #2d3a4f;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --error: #f85149;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; }
        .form-row { margin-bottom: 14px; }
        .form-row label { display: inline-block; width: 120px; font-size: 0.875rem; color: var(--text-muted); }
        .form-row input, .form-row select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.9375rem;
            width: 100%;
            max-width: 400px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 0.9375rem;
            cursor: pointer;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-danger { background: var(--error); }
        .list { margin-top: 28px; }
        .list h2 { font-size: 1.1rem; margin-bottom: 12px; }
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .item span { font-size: 0.875rem; }
        .item .webhook { color: var(--text-muted); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .msg { margin-top: 12px; font-size: 0.875rem; }
        .msg.error { color: var(--error); }
        .msg.ok { color: #3fb950; }
        nav { margin-bottom: 16px; }
        nav a { color: var(--accent); text-decoration: none; }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>订阅股票定时推送</h1>
        <p style="color: var(--text-muted); font-size: 0.875rem;">交易日交易时间每 5 分钟检查一次，按间隔向飞书机器人推送实时价格。</p>
        <div class="form-row">
            <label>股票代码</label>
            <input type="text" id="symbol" placeholder="如 600519" maxlength="12" />
        </div>
        <div class="form-row">
            <label>推送间隔</label>
            <select id="interval">
                <option value="5">5 分钟</option>
                <option value="10">10 分钟</option>
                <option value="30">30 分钟</option>
            </select>
        </div>
        <div class="form-row">
            <label>飞书机器人 Webhook</label>
            <input type="text" id="feishu_webhook" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/..." />
        </div>
        <div class="form-row">
            <label></label>
            <button type="button" class="btn" id="btnAdd">添加订阅</button>
        </div>
        <div id="msg" class="msg"></div>
        <div class="list">
            <h2>当前订阅</h2>
            <div id="list"></div>
        </div>
    </div>
    <script>
        const symbolInput = document.getElementById('symbol');
        const intervalSelect = document.getElementById('interval');
        const feishuInput = document.getElementById('feishu_webhook');
        const btnAdd = document.getElementById('btnAdd');
        const msgEl = document.getElementById('msg');
        const listEl = document.getElementById('list');

        function showMsg(text, isError) {
            msgEl.textContent = text;
            msgEl.className = 'msg' + (isError ? ' error' : ' ok');
        }

        function loadList() {
            fetch('/api/cron_stocks')
                .then(r => r.json())
                .then(data => {
                    const subs = data.subscriptions || [];
                    if (subs.length === 0) {
                        listEl.innerHTML = '<p style="color: var(--text-muted);">暂无订阅</p>';
                        return;
                    }
                    listEl.innerHTML = subs.map((s, i) =>
                        '<div class="item">' +
                        '<span>' + s.symbol + ' · 每 ' + s.interval_minutes + ' 分钟</span>' +
                        '<span class="webhook" title="' + (s.feishu_webhook_url || '') + '">' + (s.feishu_webhook_url || '').slice(0, 50) + '…</span>' +
                        '<button type="button" class="btn btn-danger" data-index="' + i + '">删除</button>' +
                        '</div>'
                    ).join('');
                    listEl.querySelectorAll('.btn-danger').forEach(btn => {
                        btn.addEventListener('click', function () {
                            const i = parseInt(this.getAttribute('data-index'), 10);
                            deleteSub(i);
                        });
                    });
                })
                .catch(() => { listEl.innerHTML = '<p class="error">加载失败</p>'; });
        }

        function deleteSub(index) {
            fetch('/api/cron_stocks?index=' + index, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    if (data.error) { showMsg(data.error, true); return; }
                    showMsg('已删除', false);
                    loadList();
                })
                .catch(e => showMsg('删除失败: ' + e.message, true));
        }

        btnAdd.addEventListener('click', function () {
            const symbol = (symbolInput.value || '').trim();
            const interval = intervalSelect.value;
            const webhook = (feishuInput.value || '').trim();
            if (!symbol) { showMsg('请填写股票代码', true); return; }
            if (!webhook) { showMsg('请填写飞书机器人 Webhook', true); return; }
            btnAdd.disabled = true;
            showMsg('', false);
            fetch('/api/cron_stocks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    symbol: symbol,
                    interval_minutes: parseInt(interval, 10),
                    feishu_webhook_url: webhook
                })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.error) { showMsg(data.error, true); return; }
                    showMsg('已添加订阅', false);
                    symbolInput.value = '';
                    feishuInput.value = '';
                    loadList();
                })
                .catch(e => showMsg('添加失败: ' + e.message, true))
                .finally(() => { btnAdd.disabled = false; });
        });

        loadList();
    </script>
</body>
</html>
